<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>航空写真 輪郭・面積検索</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; font-family: sans-serif; }
  #map { height: 100dvh; width: 100vw; cursor: grab; }

  .ui-container {
    position: absolute; top: 10px; left: 10px; right: 10px;
    z-index: 1000; display: flex; justify-content: center; pointer-events: none;
  }
  .search-box {
    background: white; padding: 10px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); text-align: center;
    pointer-events: auto; width: 100%; max-width: 420px;
  }
  .search-row { display: flex; gap: 6px; }
  #address-input {
    flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 16px; min-width: 0;
  }
  .button {
    padding: 10px 14px; border: none; background-color: #007bff;
    color: white; border-radius: 4px; cursor: pointer;
    font-size: 15px; white-space: nowrap; flex-shrink: 0;
  }
  .button:active { opacity: 0.8; }
  .button:hover { background-color: #0056b3; }
  .action-button { margin: 5px; }
  #suggestions { margin-top: 8px; max-height: 180px; overflow-y: auto; text-align: left; }
  .suggestion-item {
    padding: 10px 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px;
  }
  .suggestion-item:active { background-color: #e0e0e0; }
  .suggestion-item:hover { background-color: #f0f0f0; }
  #action-buttons { margin-top: 8px; display: flex; flex-wrap: wrap; justify-content: center; }

  #info-box {
    margin-top: 8px;
    background: rgba(0,0,0,0.7); color: white; padding: 7px 12px;
    border-radius: 6px; display: none;
    font-size: 13px; line-height: 1.5; text-align: center;
  }

  /* 現在地ボタン */
  #locate-button {
    position: absolute; bottom: 100px; right: 10px;
    z-index: 1000; width: 44px; height: 44px;
    background: white; border: 2px solid rgba(0,0,0,0.2);
    border-radius: 4px; cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 5px rgba(0,0,0,0.3);
  }
  #locate-button:active { background: #f0f0f0; }

  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
    border: 3px solid white; border-radius: 50%; box-shadow: 0 0 8px black;
    transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 999;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: white; box-shadow: 0 0 3px black;
  }
  #crosshair::before { top: 50%; left: 6px; right: 6px; height: 3px; margin-top: -1.5px; }
  #crosshair::after { left: 50%; top: 6px; bottom: 6px; width: 3px; margin-left: -1.5px; }

  /* ローディングオーバーレイ */
  #loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35); z-index: 2000;
    display: none; align-items: center; justify-content: center;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 5px solid rgba(255,255,255,0.35);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #calculator-container {
    position: absolute; bottom: 10px; left: 10px; width: 240px;
    background: white; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 1000; display: none; pointer-events: auto;
  }
  #calculator-header {
    padding: 10px; background-color: #f7f7f7; border-bottom: 1px solid #eee;
    border-top-left-radius: 8px; border-top-right-radius: 8px;
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
  }
  #calculator-header h3 { margin: 0; font-size: 16px; flex: 1; }
  #calculator-list {
    list-style-type: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto;
  }
  #calculator-list li {
    padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px;
    display: flex; justify-content: space-between;
  }
  #calculator-footer { padding: 10px; background-color: #f0f0f0; font-weight: bold; font-size: 14px; }
  #roof-calculator {
    padding: 10px; border-top: 2px solid #ddd; background-color: #f0f0f0;
    border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;
  }
  #roof-calculator > div { margin-top: 8px; }
  #roof-area-total { font-weight: bold; color: #007bff; font-size: 14px; }

  /* 手動入力セクション */
  #manual-area-section {
    border-top: 1px solid #ccc; padding-top: 8px; margin-top: 4px !important; display: none;
  }
  #manual-area-section label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  #manual-area-row { display: flex; gap: 4px; margin-top: 0 !important; }
  #manual-area-input {
    flex: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
  }
  #manual-apply-btn {
    padding: 5px 8px; background: #27ae60; color: white; border: none;
    border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  #manual-apply-btn:active { opacity: 0.8; }

  .small-btn {
    padding: 4px 8px; font-size: 12px; border: none;
    border-radius: 4px; cursor: pointer; color: white;
  }
  .small-btn:active { opacity: 0.7; }
  #copy-btn { background: #555; }
  #reset-btn { background: #e74c3c; }
  #toggle-btn { background: #888; }

  @media (max-width: 400px) {
    #calculator-container { width: calc(100vw - 20px); left: 10px; right: 10px; }
  }
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LWYHBZDC4L"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LWYHBZDC4L');
</script>
</head>
<body>

<div class="ui-container">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="address-input" placeholder="住所を入力して検索" autocomplete="off">
      <button id="search-button" class="button">検索</button>
    </div>
    <div id="suggestions"></div>
    <div id="action-buttons"></div>
    <div id="info-box"></div>
  </div>
</div>

<button id="locate-button" title="現在地へ">📍</button>

<div id="loading-overlay"><div class="spinner"></div></div>

<div id="calculator-container">
  <div id="calculator-header">
    <h3>面積計算</h3>
    <button id="toggle-btn" class="small-btn" title="折りたたむ">▼</button>
    <button id="reset-btn" class="small-btn">リセット</button>
    <button id="copy-btn" class="small-btn">コピー</button>
  </div>
  <div id="calculator-body">
    <ul id="calculator-list"></ul>
    <div id="calculator-footer">建物面積合計: 0 m²</div>
    <div id="roof-calculator">
      <div>
        <label for="slope-rate-select" style="font-size: 14px;">勾配伸び率:</label>
        <select id="slope-rate-select" style="padding: 4px; border-radius: 4px; font-size: 14px;">
          <option value="1.000">1.000 (陸屋根)</option>
          <option value="1.001">1.001 (5分)</option>
          <option value="1.005">1.005 (1寸)</option>
          <option value="1.011">1.011 (1寸5分)</option>
          <option value="1.020">1.020 (2寸)</option>
          <option value="1.031">1.031 (2寸5分)</option>
          <option value="1.044">1.044 (3寸)</option>
          <option value="1.050">1.050 (3寸5分)</option>
          <option value="1.077" selected>1.077 (4寸)</option>
          <option value="1.097">1.097 (4寸5分)</option>
          <option value="1.118">1.118 (5寸)</option>
          <option value="1.141">1.141 (5寸5分)</option>
          <option value="1.166">1.166 (6寸)</option>
          <option value="1.193">1.193 (6寸5分)</option>
          <option value="1.221">1.221 (7寸)</option>
          <option value="1.250">1.250 (7寸5分)</option>
          <option value="1.281">1.281 (8寸)</option>
          <option value="1.312">1.312 (8寸5分)</option>
          <option value="1.345">1.345 (9寸)</option>
          <option value="1.379">1.379 (9寸5分)</option>
          <option value="1.414">1.414 (矩勾配)</option>
          <option value="1.487">1.487 (9寸返し)</option>
          <option value="1.562">1.562 (8寸返し)</option>
        </select>
      </div>
      <div id="roof-area-total">屋根面積合計: 0 m²</div>
      <div id="manual-area-section">
        <label>輪郭未取得時 — 手動で面積を入力</label>
        <div id="manual-area-row">
          <input type="number" id="manual-area-input" placeholder="面積 m²" min="1">
          <button id="manual-apply-btn" onclick="applyManualArea()">適用</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="crosshair"></div>
<div id="map"></div>

<script>
  let activeLayer, currentInfo = { lat: 0, lng: 0, title: '' };
  let selectedLayers = {};
  let calculatorBodyVisible = true;

  const OVERPASS_URLS = [
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter'
  ];

  const map = L.map('map', { zoomControl: false }).setView([35.681, 139.767], 15);
  const addressInput = document.getElementById('address-input');
  const searchButton = document.getElementById('search-button');
  const suggestionsContainer = document.getElementById('suggestions');
  const actionButtonsContainer = document.getElementById('action-buttons');
  const crosshair = document.getElementById('crosshair');
  const infoBox = document.getElementById('info-box');
  const calculatorContainer = document.getElementById('calculator-container');
  const calculatorBody = document.getElementById('calculator-body');
  const calculatorList = document.getElementById('calculator-list');
  const footprintTotalFooter = document.getElementById('calculator-footer');
  const slopeRateSelect = document.getElementById('slope-rate-select');
  const roofAreaTotalDiv = document.getElementById('roof-area-total');
  const locateButton = document.getElementById('locate-button');
  const copyBtn = document.getElementById('copy-btn');
  const resetBtn = document.getElementById('reset-btn');
  const toggleBtn = document.getElementById('toggle-btn');
  const loadingOverlay = document.getElementById('loading-overlay');

  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
    attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html'>地理院タイル</a>|© <a href='https://www.openstreetmap.org/copyright'>OSM</a> contributors",
    maxNativeZoom: 18, maxZoom: 21
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  function showLoading() { loadingOverlay.style.display = 'flex'; }
  function hideLoading() { loadingOverlay.style.display = 'none'; }

  // 折りたたみトグル
  toggleBtn.addEventListener('click', () => {
    calculatorBodyVisible = !calculatorBodyVisible;
    calculatorBody.style.display = calculatorBodyVisible ? 'block' : 'none';
    toggleBtn.textContent = calculatorBodyVisible ? '▼' : '▲';
    toggleBtn.title = calculatorBodyVisible ? '折りたたむ' : '展開する';
  });

  // 現在地ボタン
  locateButton.addEventListener('click', () => {
    if (!navigator.geolocation) { alert('この端末はGPSに対応していません。'); return; }
    locateButton.textContent = '⏳';
    navigator.geolocation.getCurrentPosition(
      pos => {
        locateButton.textContent = '📍';
        const { latitude, longitude } = pos.coords;
        map.setView([latitude, longitude], 19);
        setupAdjustmentMode(latitude, longitude, '現在地');
      },
      err => {
        locateButton.textContent = '📍';
        if (err.code === 1) alert('位置情報のアクセスが許可されていません。\niPhoneの場合：設定 → Safari → 位置情報 → 許可');
        else alert('現在地を取得できませんでした。');
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });

  // コピーボタン
  copyBtn.addEventListener('click', () => {
    const footprint = footprintTotalFooter.textContent;
    const roof = roofAreaTotalDiv.textContent;
    const slope = slopeRateSelect.options[slopeRateSelect.selectedIndex].text;
    const text = `【屋根面積計算】\n${footprint}\n勾配: ${slope}\n${roof}`;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = '✓';
        setTimeout(() => copyBtn.textContent = 'コピー', 2000);
      });
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      copyBtn.textContent = '✓';
      setTimeout(() => copyBtn.textContent = 'コピー', 2000);
    }
  });

  // リセットボタン
  resetBtn.addEventListener('click', () => {
    if (activeLayer) {
      activeLayer.eachLayer(layer => {
        if (layer.setStyle) layer.setStyle({ color: '#3388ff' });
      });
    }
    resetCalculator();
  });

  searchButton.addEventListener('click', () => { addressInput.blur(); handleSearch(); });
  addressInput.addEventListener('keypress', e => { if (e.key === 'Enter') { addressInput.blur(); handleSearch(); } });
  slopeRateSelect.addEventListener('change', updateCalculator);

  async function fetchWithTimeout(resource, options = {}, timeout = 12000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    const response = await fetch(resource, { ...options, signal: controller.signal });
    clearTimeout(id);
    return response;
  }

  function updateUI(mode) {
    crosshair.style.display = 'none';
    actionButtonsContainer.innerHTML = '';
    infoBox.style.display = 'none';
    if (mode !== 'polygon_displayed') calculatorContainer.style.display = 'none';

    if (mode === 'adjust') {
      crosshair.style.display = 'block';
      infoBox.textContent = '十字の中心を建物に合わせ、ボタンを押してください';
      infoBox.style.display = 'block';
      const multiBtn = document.createElement('button');
      multiBtn.className = 'button action-button';
      multiBtn.textContent = '周辺50mの輪郭を取得';
      multiBtn.onclick = () => handlePolygonFetch(true);
      actionButtonsContainer.appendChild(multiBtn);
    } else if (mode === 'polygon_displayed') {
      infoBox.textContent = '輪郭が違う場合は再調整できます。周辺検索時は輪郭クリックで面積計算できます。';
      infoBox.style.display = 'block';
      const retryBtn = document.createElement('button');
      retryBtn.className = 'button';
      retryBtn.style.fontSize = '14px';
      retryBtn.textContent = '位置を再調整する';
      retryBtn.onclick = enterAdjustmentModeFromCurrentView;
      actionButtonsContainer.appendChild(retryBtn);
    } else if (mode === 'fetch_failed') {
      crosshair.style.display = 'block';
      infoBox.style.display = 'block';
      const retryBtn = document.createElement('button');
      retryBtn.className = 'button action-button';
      retryBtn.textContent = '周辺50mの輪郭を取得';
      retryBtn.onclick = () => handlePolygonFetch(true);
      const manualBtn = document.createElement('button');
      manualBtn.className = 'button action-button';
      manualBtn.style.backgroundColor = '#27ae60';
      manualBtn.textContent = '面積を手動入力';
      manualBtn.onclick = showManualInput;
      actionButtonsContainer.appendChild(retryBtn);
      actionButtonsContainer.appendChild(manualBtn);
    }
  }

  function clearActiveLayer() { if (activeLayer) map.removeLayer(activeLayer); activeLayer = null; }
  function enterAdjustmentModeFromCurrentView() { clearActiveLayer(); updateUI('adjust'); }

  function setupAdjustmentMode(lat, lng, title) {
    clearActiveLayer();
    suggestionsContainer.innerHTML = '';
    currentInfo = { lat, lng, title };
    map.setView([lat, lng], 19);
    updateUI('adjust');
  }

  function showManualInput() {
    crosshair.style.display = 'none';
    actionButtonsContainer.innerHTML = '';
    infoBox.style.display = 'none';
    calculatorContainer.style.display = 'block';
    document.getElementById('manual-area-section').style.display = 'block';
    if (!calculatorBodyVisible) {
      calculatorBodyVisible = true;
      calculatorBody.style.display = 'block';
      toggleBtn.textContent = '▼';
      toggleBtn.title = '折りたたむ';
    }
  }

  function applyManualArea() {
    const input = document.getElementById('manual-area-input');
    const area = parseFloat(input.value);
    if (!area || area <= 0) { alert('有効な面積を入力してください。'); return; }
    selectedLayers['manual'] = { area: Math.round(area), id: 'manual' };
    updateCalculator();
  }

  async function handlePolygonFetch(fetchAll = false) {
    const center = map.getCenter();
    currentInfo.lat = center.lat; currentInfo.lng = center.lng;
    crosshair.style.display = 'none';
    actionButtonsContainer.innerHTML = '';
    infoBox.textContent = '輪郭データを検索中...';
    infoBox.style.display = 'block';
    showLoading();
    try {
      const buildings = await fetchBuildingPolygons(center.lat, center.lng);
      clearActiveLayer();
      if (!buildings || buildings.length === 0) throw new Error('この場所の建物の輪郭データは見つかりませんでした。');

      if (fetchAll) {
        const layers = buildings.map(b => createPolygonLayer(b)).filter(l => l !== null);
        if (layers.length > 0) {
          activeLayer = L.featureGroup(layers).addTo(map);
          map.fitBounds(activeLayer.getBounds(), { padding: [50, 50] });
          calculatorContainer.style.display = 'block';
          resetCalculator();
        } else { throw new Error('有効な輪郭データが見つかりませんでした。'); }
      } else {
        let closestBuilding = findClosestBuilding(center, buildings);
        if (closestBuilding) {
          activeLayer = createPolygonLayer(closestBuilding, currentInfo.title);
          if (activeLayer) { activeLayer.addTo(map); map.fitBounds(activeLayer.getBounds(), { padding: [50, 50] }); }
          else { throw new Error('有効な輪郭データが見つかりませんでした。'); }
        } else { throw new Error('最も近い建物が見つかりませんでした。'); }
      }
      updateUI('polygon_displayed');
    } catch (error) {
      const msg = error.name === 'AbortError' ? '検索がタイムアウトしました。' : error.message;
      updateUI('fetch_failed');
      infoBox.textContent = msg;
      infoBox.style.display = 'block';
    } finally {
      hideLoading();
    }
  }

  function createPolygonLayer(building, title = '') {
    const geom = building.geometry;
    if (!geom || geom.length < 3) return null;
    const polygonCoords = geom.map(node => [node.lon, node.lat]);
    if (polygonCoords[0][0] !== polygonCoords[polygonCoords.length - 1][0] ||
        polygonCoords[0][1] !== polygonCoords[polygonCoords.length - 1][1]) {
      polygonCoords.push(polygonCoords[0]);
    }
    const turfPolygon = turf.polygon([polygonCoords]);
    const area = turf.area(turfPolygon);
    const areaString = `<b>面積: ${Math.round(area)} m²</b>`;
    const leafletCoords = polygonCoords.map(p => [p[1], p[0]]);
    const layer = L.polygon(leafletCoords, { color: '#3388ff' });
    layer.feature = { properties: { area: Math.round(area), id: building.id, originalCoords: leafletCoords } };
    layer.bindPopup(title ? `${title}<br>${areaString}` : areaString);
    layer.on('click', toggleSelection);
    return layer;
  }

  function toggleSelection(e) {
    const layer = e.target;
    const id = layer.feature.properties.id;
    if (selectedLayers.hasOwnProperty(id)) {
      delete selectedLayers[id];
      layer.setStyle({ color: '#3388ff' });
    } else {
      selectedLayers[id] = layer.feature.properties;
      layer.setStyle({ color: 'yellow' });
    }
    updateCalculator();
  }

  function resetCalculator() {
    selectedLayers = {};
    document.getElementById('manual-area-section').style.display = 'none';
    const manualInput = document.getElementById('manual-area-input');
    if (manualInput) manualInput.value = '';
    updateCalculator();
  }

  function updateCalculator() {
    calculatorList.innerHTML = '';
    let totalFootprintArea = 0;
    let counter = 1;
    for (const id in selectedLayers) {
      const props = selectedLayers[id];
      const li = document.createElement('li');
      const label = id === 'manual' ? '手動入力' : `建物${counter++}`;
      li.innerHTML = `<span>${label}</span><span>${props.area} m²</span>`;
      calculatorList.appendChild(li);
      totalFootprintArea += props.area;
    }
    const slopeRate = parseFloat(slopeRateSelect.value);
    const totalRoofArea = totalFootprintArea * slopeRate;
    footprintTotalFooter.textContent = `建物面積合計: ${totalFootprintArea} m²`;
    roofAreaTotalDiv.textContent = `屋根面積合計: ${Math.round(totalRoofArea)} m²`;

    // 見積もりボタン
    let estimateBtn = document.getElementById('estimate-link-btn');
    if (!estimateBtn) {
      estimateBtn = document.createElement('a');
      estimateBtn.id = 'estimate-link-btn';
      estimateBtn.style.cssText = 'display:block; margin-top:10px; padding:8px; background:#e67e22; color:white; text-align:center; border-radius:4px; text-decoration:none; font-size:13px; transition:opacity 0.2s;';
      estimateBtn.textContent = '🏠 見積もりを作成する';
      document.getElementById('roof-calculator').appendChild(estimateBtn);
    }
    const area = Math.round(totalRoofArea);
    const addr = encodeURIComponent(currentInfo.title || '');
    estimateBtn.href = area > 0 ? `estimate.html?area=${area}&address=${addr}` : '#';
    estimateBtn.style.opacity = area > 0 ? '1' : '0.4';
    estimateBtn.style.pointerEvents = area > 0 ? 'auto' : 'none';
  }

  function findClosestBuilding(center, buildings) {
    let minDistance = Infinity, closestBuilding = null;
    const centerPoint = turf.point([center.lng, center.lat]);
    buildings.forEach(building => {
      const geom = building.geometry;
      if (!geom || geom.length < 3) return;
      const polygonCoords = geom.map(node => [node.lon, node.lat]);
      if (polygonCoords[0][0] !== polygonCoords[polygonCoords.length - 1][0] ||
          polygonCoords[0][1] !== polygonCoords[polygonCoords.length - 1][1]) {
        polygonCoords.push(polygonCoords[0]);
      }
      const turfPolygon = turf.polygon([polygonCoords]);
      const centroid = turf.centroid(turfPolygon);
      const distance = turf.distance(centerPoint, centroid, { units: 'meters' });
      if (distance < minDistance) { minDistance = distance; closestBuilding = building; }
    });
    return closestBuilding;
  }

  async function fetchBuildingPolygons(lat, lon) {
    const radius = 50;
    const query = `[out:json][timeout:15];way(around:${radius},${lat},${lon})["building"];out geom;`;
    let lastError;
    for (const url of OVERPASS_URLS) {
      try {
        const response = await fetchWithTimeout(url, { method: 'POST', body: query }, 12000);
        if (!response.ok) { lastError = new Error(`サーバー応答エラー: ${response.status}`); continue; }
        const data = await response.json();
        return data.elements.filter(e => e.type === 'way' && e.geometry);
      } catch (e) {
        lastError = e;
      }
    }
    throw lastError || new Error('輪郭データの取得に失敗しました。');
  }

  function displaySuggestions(results) {
    suggestionsContainer.innerHTML = '';
    const header = document.createElement('div');
    header.style.padding = '4px 0';
    header.innerHTML = '<b>こちらの住所でしょうか？</b>';
    suggestionsContainer.appendChild(header);
    results.forEach(result => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      item.textContent = result.properties.title;
      item.onclick = () => {
        const coords = result.geometry.coordinates;
        addressInput.blur();
        setupAdjustmentMode(coords[1], coords[0], result.properties.title);
      };
      suggestionsContainer.appendChild(item);
    });
  }

  async function handleSearch() {
    const address = addressInput.value;
    if (!address) { alert('住所を入力してください。'); return; }
    suggestionsContainer.innerHTML = '検索中...';
    actionButtonsContainer.innerHTML = '';
    try {
      const gsiApiUrl = `https://msearch.gsi.go.jp/address-search/AddressSearch?q=${encodeURIComponent(address)}`;
      const response = await fetchWithTimeout(gsiApiUrl);
      if (response.ok) {
        const data = await response.json();
        if (data.length > 0) { displaySuggestions(data); return; }
      }
      suggestionsContainer.innerHTML = '';
      alert('指定された住所が見つかりませんでした。');
    } catch (error) {
      suggestionsContainer.innerHTML = '';
      alert(error.name === 'AbortError' ? '住所検索がタイムアウトしました。' : `住所検索エラー: ${error.message}`);
    }
  }
</script>
</body>
